<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaX · Entrar</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-wrap { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card {
      width: 100%; max-width: 420px; background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r-lg); backdrop-filter: blur(20px); padding: 36px 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5); animation: cardUp 0.5s var(--spring);
    }
    @keyframes cardUp { from { opacity: 0; transform: translateY(24px) scale(0.96); } to { opacity: 1; transform: none; } }
    .login-logo { width: 60px; height: 60px; border-radius: 16px; display: grid; place-items: center; margin: 0 auto 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 0 32px rgba(var(--accent-rgb),0.5); }
    .login-logo svg { width: 34px; height: 34px; color: var(--accent-ink); }
    .login-title { text-align: center; font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .login-title .x { color: var(--accent); }
    .login-sub { text-align: center; color: var(--fg-2); font-size: 14px; margin: 0 0 28px; line-height: 1.5; }
    .kc-banner { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--r); background: var(--bg-2); border: 1px solid var(--border); margin-bottom: 22px; }
    .kc-banner .ring { width: 30px; height: 30px; border-radius: 8px; background: rgba(var(--accent-rgb),0.14); display: grid; place-items: center; color: var(--accent); flex: none; }
    .kc-banner .ring svg { width: 17px; height: 17px; }
    .kc-banner .meta { line-height: 1.3; }
    .kc-banner .meta .t { font-size: 12.5px; font-weight: 600; }
    .kc-banner .meta .d { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.04em; }
    .lbtn { width: 100%; padding: 16px; border-radius: var(--r); font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: var(--accent-ink); box-shadow: 0 8px 30px rgba(var(--accent-rgb),0.35); transition: var(--dur-fast); }
    .lbtn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(var(--accent-rgb),0.5); }
    .lbtn.ghost { background: var(--panel-2); color: var(--fg-1); border: 1px solid var(--border); box-shadow: none; }
    .lbtn.ghost:hover { background: var(--panel); transform: none; border-color: var(--border-strong); }
    .login-foot { text-align: center; margin-top: 20px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--fg-4); }
    /* keycloak-styled IdP card */
    .kc-chrome { display: flex; align-items: center; gap: 10px; padding-bottom: 18px; margin-bottom: 22px; border-bottom: 1px solid var(--border); }
    .kc-chrome .badge { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); padding: 5px 10px; border: 1px solid var(--border); border-radius: 100px; }
    .kc-chrome .realm { font-size: 13px; color: var(--fg-2); }
    .kc-chrome .realm b { color: var(--fg-1); }
    .field-group { margin-bottom: 16px; }
    .field-group label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-4); margin-bottom: 7px; }
    .field-group input { width: 100%; padding: 13px 14px; border-radius: var(--r); background: var(--bg-2); border: 1px solid var(--border); color: var(--fg-1); font-size: 15px; outline: none; transition: var(--dur-fast); }
    .field-group input:focus { border-color: rgba(var(--accent-rgb),0.5); box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.1); }
    .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; margin: 8px auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .redir-dots { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }
    .redir-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1s ease-in-out infinite; }
    .redir-dots span:nth-child(2) { animation-delay: 0.15s; } .redir-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,100% { opacity: 0.3; transform: translateY(0);} 50% { opacity: 1; transform: translateY(-5px);} }
    .demo-hint { font-size: 11.5px; color: var(--fg-3); text-align: center; margin-top: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="bg-ambient"></div>
  <div id="root" class="login-wrap"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState } = React;

    /* build a (fake, unsigned) JWT to mimic a Keycloak access token */
    function b64url(obj) {
      return btoa(JSON.stringify(obj)).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }
    function makeToken(username) {
      const now = Math.floor(Date.now() / 1000);
      const header = { alg: "RS256", typ: "JWT", kid: "crash-realm-key" };
      const payload = {
        iss: "http://localhost:8080/realms/crash-game",
        azp: "crash-game-client",
        sub: "f:" + Math.random().toString(36).slice(2),
        preferred_username: username,
        name: username,
        balance: 1000,
        iat: now, exp: now + 3600,
        realm_access: { roles: ["player"] },
      };
      return `${b64url(header)}.${b64url(payload)}.sig_demo_${Math.random().toString(36).slice(2, 10)}`;
    }

    const RocketLogo = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
        <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
        <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
      </svg>
    );
    const Lock = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);

    function Login() {
      // step: landing -> idp (keycloak) -> authorizing -> redirecting
      const [step, setStep] = useState("landing");
      const [user, setUser] = useState("player");
      const [pass, setPass] = useState("player123");

      const goIdp = () => setStep("idp");
      const authorize = (e) => {
        e && e.preventDefault();
        if (!user.trim()) return;
        setStep("authorizing");
        setTimeout(() => setStep("redirecting"), 1100);
        setTimeout(() => {
          const token = makeToken(user.trim());
          localStorage.setItem("crash_auth", JSON.stringify({ token, balance: 1000 }));
          window.location.replace("CrashGame.html");
        }, 2200);
      };

      if (step === "authorizing" || step === "redirecting") {
        return (
          <div className="login-card" style={{ textAlign: "center" }}>
            <div className="spinner"></div>
            <h2 className="login-title" style={{ fontSize: 19 }}>
              {step === "authorizing" ? "Autenticando" : "Redirecionando"}
            </h2>
            <p className="login-sub" style={{ marginBottom: 6 }}>
              {step === "authorizing"
                ? "Validando credenciais no realm crash-game…"
                : "Trocando authorization code por tokens e voltando ao app…"}
            </p>
            <div className="redir-dots"><span></span><span></span><span></span></div>
          </div>
        );
      }

      if (step === "idp") {
        return (
          <form className="login-card" onSubmit={authorize}>
            <div className="kc-chrome">
              <div className="login-logo" style={{ width: 38, height: 38, borderRadius: 10, margin: 0 }}><Lock /></div>
              <div>
                <div className="realm">Sign in to <b>crash-game</b></div>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--fg-4)", letterSpacing: "0.04em" }}>localhost:8080 · Keycloak</div>
              </div>
            </div>
            <div className="field-group">
              <label>Usuário ou e-mail</label>
              <input value={user} onChange={(e) => setUser(e.target.value)} autoFocus />
            </div>
            <div className="field-group">
              <label>Senha</label>
              <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} />
            </div>
            <button className="lbtn" type="submit">Entrar</button>
            <p className="demo-hint">Demo do client <b>crash-game-client</b>. No backend real, o redirect vai ao Keycloak e o callback troca o <b>code</b> por tokens. Aqui o JWT é gerado localmente e decodificado para extrair o <b>username</b>.</p>
          </form>
        );
      }

      return (
        <div className="login-card">
          <div className="login-logo"><RocketLogo /></div>
          <h1 className="login-title">NOVA<span className="x">X</span></h1>
          <p className="login-sub">Crash game provably-fair.<br/>Aposte, assista o multiplicador subir e saque antes do crash.</p>
          <div className="kc-banner">
            <div className="ring"><Lock /></div>
            <div className="meta">
              <div className="t">Login seguro via Keycloak</div>
              <div className="d">OIDC · Authorization Code + PKCE (S256)</div>
            </div>
          </div>
          <button className="lbtn" onClick={goIdp}>
            <Lock />
            Entrar com Keycloak
            <span style={{ fontFamily: "var(--font-mono)" }}>→</span>
          </button>
          <div className="login-foot">PROTÓTIPO · SEM DINHEIRO REAL</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Login />);
  </script>
</body>
</html>
